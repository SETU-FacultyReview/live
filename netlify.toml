[build]
  # Set base to repository root
  base = "/"

  # Build command runs the Python generator, then Tutors Deno CLI
  command = """
    cd tutors-generator && \
    python3 generate-by-dept.py && \
    deno run -A jsr:@tutors/tutors
  """

  # Publish the generated JSON output (relative to base)
  publish = "tutors-generator/tutors-modules-by-dept/json"

[build.environment]
  # Ensure Python 3 is available
  PYTHON_VERSION = "3.11"

  # Deno version (Netlify has Deno pre-installed)
  DENO_VERSION = "1.40"

  # Tutors course ID (used in weburl paths)
  TUTORS_COURSE_ID = "setu-sci-modules"

# Optional: Add redirects if needed for the deployed site
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200
